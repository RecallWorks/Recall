[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "recall"
version = "0.1.0"
description = "Open-source agent-memory MCP server. recall.works"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Recall contributors" }]
keywords = ["mcp", "agent", "memory", "rag", "vector-store", "copilot"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "chromadb>=0.5,<1.0",
    "starlette>=0.37",
    "uvicorn[standard]>=0.30",
    "anyio>=4.0",
]

[project.optional-dependencies]
mcp  = ["mcp>=1.27.0"]
test = ["pytest>=8.0", "pytest-asyncio>=0.23", "httpx>=0.27"]
dev  = ["recall[mcp,test]", "ruff>=0.5", "mypy>=1.10"]

[project.scripts]
recall-server = "recall.app:main"

[project.urls]
Homepage = "https://recall.works"
Source   = "https://github.com/recallworks/recall"

[tool.hatch.build.targets.wheel]
packages = ["src/recall"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]
