<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1152" width="2048" height="1152">
  <!--
    YouTube banner safe areas:
      Text & logos (all devices): 1235 x 338 centered → x:407-1642, y:407-745
      Desktop viewable strip:     2048 x 423 centered → y:365-788
    Everything critical lives inside the 1235x338 safe area.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C7802F" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#C7802F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C7802F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E59A45"/>
      <stop offset="50%" stop-color="#C7802F"/>
      <stop offset="100%" stop-color="#9B6320"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#C7802F" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="2048" height="1152" fill="url(#bg)"/>
  <rect width="2048" height="1152" fill="url(#grid)"/>
  <ellipse cx="1024" cy="576" rx="900" ry="400" fill="url(#glow)"/>

  <!-- decorative chunk lattice — outside safe area, only seen on TV/wide-desktop crops -->
  <g opacity="0.22">
    <g transform="translate(180,300)">
      <rect x="0"   y="0"   width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="56"  y="0"   width="44" height="44" fill="#C7802F" fill-opacity="0.18" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="112" y="0"   width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="56"  width="44" height="44" fill="#C7802F" fill-opacity="0.35" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="56"  y="56"  width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="112" y="56"  width="44" height="44" fill="#C7802F" fill-opacity="0.10" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="112" width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="56"  y="112" width="44" height="44" fill="#C7802F" fill-opacity="0.25" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="112" y="112" width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
    </g>
    <g transform="translate(1700,800)">
      <rect x="0"   y="0"   width="44" height="44" fill="#C7802F" fill-opacity="0.20" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="56"  y="0"   width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="112" y="0"   width="44" height="44" fill="#C7802F" fill-opacity="0.40" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="56"  width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="56"  y="56"  width="44" height="44" fill="#C7802F" fill-opacity="0.10" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="112" y="56"  width="44" height="44" fill="none" stroke="#C7802F" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ============== SAFE AREA CONTENT (x:407-1642, y:407-745) ============== -->

  <!-- wordmark Recall™ — fits inside 1235px-wide safe area at this size -->
  <text x="1024" y="600" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="170" fill="#fafafa" letter-spacing="-4">Recall<tspan font-size="68" dy="-72" fill="url(#accent)">™</tspan></text>

  <!-- accent rule under wordmark -->
  <rect x="900" y="630" width="248" height="3" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="1024" y="690" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="34" fill="#dadada" letter-spacing="1.5">
    Durable memory for AI coding agents.
  </text>

  <!-- six pillars -->
  <text x="1024" y="732" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="20" fill="#999" letter-spacing="5">
    MEMORY  ·  COMPUTE  ·  VAULT  ·  GUARDRAILS  ·  BRAIN  ·  CONTINUITY
  </text>

  <!-- ============== OUTSIDE SAFE AREA (TV-only details) ============== -->

  <!-- domain corner (TV crop) -->
  <text x="1928" y="1102" text-anchor="end" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="22" fill="#C7802F" letter-spacing="2">
    recall.works
  </text>

  <!-- attribution corner (TV crop) -->
  <text x="120" y="1102" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#666" letter-spacing="1">
    a MortgageTech open project
  </text>
</svg>
