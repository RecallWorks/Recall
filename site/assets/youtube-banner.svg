<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1152" width="2048" height="1152">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C7802F" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#C7802F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C7802F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E59A45"/>
      <stop offset="50%" stop-color="#C7802F"/>
      <stop offset="100%" stop-color="#9B6320"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#C7802F" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="2048" height="1152" fill="url(#bg)"/>
  <rect width="2048" height="1152" fill="url(#grid)"/>
  <rect width="2048" height="1152" fill="url(#glow)"/>

  <!-- decorative chunk lattice (memory metaphor) on left side, outside safe area -->
  <g opacity="0.30">
    <g transform="translate(120,260)">
      <rect x="0"   y="0"   width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="60"  y="0"   width="48" height="48" fill="#C7802F" fill-opacity="0.18" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="120" y="0"   width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="60"  width="48" height="48" fill="#C7802F" fill-opacity="0.35" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="60"  y="60"  width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="120" y="60"  width="48" height="48" fill="#C7802F" fill-opacity="0.10" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="120" width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="60"  y="120" width="48" height="48" fill="#C7802F" fill-opacity="0.25" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="120" y="120" width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
    </g>
    <g transform="translate(1760,720)">
      <rect x="0"   y="0"   width="48" height="48" fill="#C7802F" fill-opacity="0.20" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="60"  y="0"   width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="120" y="0"   width="48" height="48" fill="#C7802F" fill-opacity="0.40" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="0"   y="60"  width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="60"  y="60"  width="48" height="48" fill="#C7802F" fill-opacity="0.10" stroke="#C7802F" stroke-width="1.5"/>
      <rect x="120" y="60"  width="48" height="48" fill="none" stroke="#C7802F" stroke-width="1.5"/>
    </g>
    <!-- connector lines -->
    <path d="M 300 408 Q 1024 350 1748 760" stroke="#C7802F" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 8"/>
  </g>

  <!-- SAFE AREA: 1235x338 centered. Center: x 407–1642, y 407–745 -->

  <!-- wordmark -->
  <g transform="translate(1024,520)" text-anchor="middle">
    <text font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="220" fill="#fafafa" letter-spacing="-6">
      Recall<tspan font-size="90" dy="-90" fill="url(#accent)">™</tspan>
    </text>
  </g>

  <!-- accent rule under wordmark -->
  <rect x="824" y="560" width="400" height="3" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="1024" y="640" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="44" fill="#dadada" letter-spacing="2">
    Durable memory for AI coding agents.
  </text>

  <!-- subtag with pillars -->
  <text x="1024" y="700" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="26" fill="#999" letter-spacing="6" textLength="900" lengthAdjust="spacingAndGlyphs">
    MEMORY  ·  COMPUTE  ·  VAULT  ·  GUARDRAILS  ·  BRAIN  ·  CONTINUITY
  </text>

  <!-- domain corner -->
  <text x="1928" y="1102" text-anchor="end" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="22" fill="#C7802F" letter-spacing="2">
    recall.works
  </text>

  <!-- subtle by line on left bottom -->
  <text x="120" y="1102" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#666" letter-spacing="1">
    a MortgageTech open project
  </text>
</svg>
